name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    # 1️⃣ Create Buildozer venv and install dependencies
    - name: Setup Buildozer venv
      shell: bash
      run: |
        python -m venv buildozer-venv
        source buildozer-venv/bin/activate
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36 buildozer python-for-android

    # 2️⃣ Build APK
    - name: Build APK
      shell: bash
      working-directory: ./   # jithe buildozer.spec hai
      run: |
        source buildozer-venv/bin/activate
        python -m buildozer android debug
