name: Build APK (Stable IPTV)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev libssl-dev libsqlite3-dev sqlite3 libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libunwind-dev wget
        python -m pip install --upgrade pip
        pip install cython==0.29.36 python-for-android==2024.1.21 kivy==2.2.0 ffpyplayer requests

    - name: Setup Android NDK
      run: |
        mkdir -p $HOME/android-ndk
        cd $HOME/android-ndk
        wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
        unzip android-ndk-r25b-linux.zip
        echo "ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-r25b" >> $GITHUB_ENV

    - name: Clean previous build
      run: |
        rm -rf ./.p4a_build ./.build ~/.local/share/python-for-android/dists/iptvbuild

    - name: Build APK
      run: |
        p4a apk \
          --private . \
          --package=org.test.iptv \
          --name "IPTV Player" \
          --version 1.0 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy==2.2.0,ffpyplayer,requests \
          --android-api=34 \
          --arch=arm64-v8a \
          --ndk-dir=$ANDROID_NDK_HOME \
          --dist_name=iptvbuild \
          --ignore-setup-py

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: IPTV-APK
        path: ~/.local/share/python-for-android/dists/iptvbuild/build/outputs/apk/debug/*.apk
