name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer python-for-android

    - name: Install Android SDK + Build-Tools + AIDL
      run: |
        SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_ROOT/cmdline-tools

        # Download cmdline-tools only if missing
        if [ ! -f "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $SDK_ROOT/cmdline-tools/
          rm cmdline-tools.zip
          mv $SDK_ROOT/cmdline-tools/cmdline-tools $SDK_ROOT/cmdline-tools/latest
        fi

        export ANDROID_SDK_ROOT=$SDK_ROOT
        export PATH=$SDK_ROOT/cmdline-tools/latest/bin:$PATH

        # Accept licenses non-interactively
        yes | sdkmanager --licenses || true

        # Install build-tools & platform
        sdkmanager "build-tools;33.0.2" "platforms;android-33"

        # Verify aidl exists
        if [ ! -f "$SDK_ROOT/build-tools/33.0.2/aidl" ]; then
          echo "AIDL not found! Exiting..."
          exit 1
        fi

    - name: Build APK with Buildozer
      run: |
        buildozer android debug deploy run

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: bin/*.apk
