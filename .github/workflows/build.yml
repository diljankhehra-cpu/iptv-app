name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y zip unzip openjdk-17-jdk zlib1g-dev wget curl git

    - name: Build APK with Buildozer
      shell: bash
      run: |
        # Go to app folder
        cd ./app

        # Create and use virtual environment
        python -m venv buildozer-venv

        # Install Python packages inside venv
        ./buildozer-venv/bin/pip install --upgrade pip setuptools wheel
        ./buildozer-venv/bin/pip install cython==0.29.36 buildozer python-for-android

        # Build the APK
        ./buildozer-venv/bin/buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: ./app/bin/*.apk
