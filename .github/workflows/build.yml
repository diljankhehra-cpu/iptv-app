name: Build APK (Final AIDL Fix)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Install dependencies
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip git zip unzip openjdk-17-jdk \
            build-essential libssl-dev libffi-dev \
            zlib1g-dev libncurses-dev libstdc++6 \
            libsqlite3-dev

      # ✅ Install Buildozer
      - name: Install Buildozer
        run: |
          pip3 install --upgrade pip setuptools wheel
          pip3 install cython==0.29.33 buildozer

      # ✅ Setup Android SDK
      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip -d cmdline-tools
          mv cmdline-tools/cmdline-tools cmdline-tools/latest

          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      # ✅ Install SDK + FIX
      - name: Install SDK Packages
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

          yes | sdkmanager --licenses

          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

          # 🔥 Ensure correct build-tools
          mkdir -p $HOME/android-sdk/build-tools
          ln -sf $HOME/android-sdk/build-tools/33.0.2 $HOME/android-sdk/build-tools/latest

          ls $HOME/android-sdk/build-tools

      # ✅ 🔥 LINK SDK TO BUILDOZER (MAIN FIX)
      - name: Link SDK to Buildozer
        run: |
          mkdir -p $HOME/.buildozer/android/platform
          ln -sf $HOME/android-sdk $HOME/.buildozer/android/platform/android-sdk

          ls $HOME/.buildozer/android/platform/

      # ✅ Fix AIDL path
      - name: Fix AIDL
        run: |
          echo "$HOME/android-sdk/build-tools/33.0.2" >> $GITHUB_PATH

      # ✅ Build APK (FINAL FIX)
      - name: Build APK
        run: |
          export BUILDOZER_ALLOW_ROOT=1
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_HOME=$HOME/android-sdk

          buildozer android debug

      # ✅ Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-APK
          path: bin/*.apk
