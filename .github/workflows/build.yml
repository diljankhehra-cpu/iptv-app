name: Build APK (Fixed Buildozer)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Install dependencies
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk wget

      # Install Buildozer
      - name: Install Buildozer
        run: |
          pip3 install --upgrade buildozer

      # Setup Android SDK and NDK manually
      - name: Setup Android SDK & NDK
        run: |
          mkdir -p $HOME/.buildozer/android/platform
          cd $HOME/.buildozer/android/platform

          # Install NDK (if not already)
          if [ ! -d "android-ndk-r25b" ]; then
            wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O android-ndk.zip
            unzip android-ndk.zip
            rm android-ndk.zip
          fi

          # Install SDK command-line tools
          mkdir -p android-sdk
          cd android-sdk
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip
          rm cmdline-tools.zip
          mkdir -p tools/bin
          mv cmdline-tools/* tools/bin/

      # Run Buildozer
      - name: Build APK
        run: |
          cd $GITHUB_WORKSPACE
          buildozer android debug
