name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout repo
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Setup Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    # 3. Install system dependencies
    - name: Install system packages
      run: |
        sudo apt update
        sudo apt install -y zip unzip openjdk-17-jdk zlib1g-dev wget curl tar

    # 4. Create Python virtual environment & install Buildozer + P4A
    - name: Setup virtual environment
      shell: bash
      run: |
        python -m venv buildozer-venv
        source buildozer-venv/bin/activate
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36 buildozer python-for-android

    # 5. Setup Android SDK & accept licenses
    - name: Install Android SDK + Build Tools
      shell: bash
      run: |
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip -d $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest
        rm cmdline-tools.zip
        yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk --licenses
        $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager \
          --sdk_root=$HOME/.buildozer/android/platform/android-sdk \
          "platform-tools" \
          "platforms;android-33" \
          "build-tools;33.0.2"

    # 6. Build APK
    - name: Build APK
      shell: bash
      run: |
        source buildozer-venv/bin/activate
        buildozer android debug
      working-directory: ./app
