name: Build APK (Ultimate Final Stable)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # 📥 Checkout
    - name: Checkout
      uses: actions/checkout@v4

    # 🐍 Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # ☕ Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"

    # 📦 Install dependencies
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev \
          cmake libffi-dev libssl-dev \
          libsqlite3-dev sqlite3 \
          libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev \
          libunwind-dev wget

        python -m pip install --upgrade pip
        pip install cython==0.29.36
        pip install python-for-android==2024.1.21

    # 🔥 Download & Set NDK 25b
    - name: Setup Android NDK
      run: |
        mkdir -p $HOME/android-ndk
        cd $HOME/android-ndk
        wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
        unzip android-ndk-r25b-linux.zip
        echo "ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-r25b" >> $GITHUB_ENV

    # 🚀 Build APK
    - name: Build APK
      run: |
        p4a apk \
        --private . \
        --package=org.test.iptv \
        --name "IPTV Player" \
        --version 1.0 \
        --bootstrap=sdl2 \
        --requirements=python3,kivy==2.2.0,requests,urllib3,certifi,idna,charset_normalizer \
        --android-api=34 \
        --arch=arm64-v8a \
        --ndk-dir=$ANDROID_NDK_HOME \
        --dist_name=iptvbuild

    # 📦 Upload APK (PATH FIXED)
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: IPTV-APK
        path: /home/runner/.local/share/python-for-android/dists/iptvbuild/build/outputs/apk/debug/*.apk
