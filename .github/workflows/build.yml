- name: Build APK
  shell: bash
  working-directory: ./   # jithe buildozer.spec file hai
  run: |
    # 1️⃣ Activate Buildozer virtual environment
    if [ -f buildozer-venv/bin/activate ]; then
        source buildozer-venv/bin/activate
    else
        echo "Error: buildozer-venv not found. Make sure previous steps created the venv."
        exit 1
    fi

    # 2️⃣ Upgrade pip and install required packages
    pip install --upgrade pip setuptools wheel
    pip install cython==0.29.36 buildozer python-for-android

    # 3️⃣ Confirm Cython is installed
    cython --version

    # 4️⃣ Build APK in debug mode
    python -m buildozer android debug
