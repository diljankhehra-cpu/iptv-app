name: Build APK (Fixed Buildozer)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Install system dependencies
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk wget

      # Install Buildozer + Cython
      - name: Install Buildozer & Cython
        run: |
          pip3 install --upgrade buildozer cython

      # Setup Android SDK & NDK
      - name: Setup Android SDK & NDK
        run: |
          mkdir -p $HOME/.buildozer/android/platform
          cd $HOME/.buildozer/android/platform

          # Install NDK
          if [ ! -d "android-ndk-r25b" ]; then
            wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O android-ndk.zip
            unzip android-ndk.zip
            rm android-ndk.zip
          fi

          # Install SDK command-line tools
          mkdir -p android-sdk
          cd android-sdk
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip
          rm cmdline-tools.zip
          mkdir -p tools/bin
          mv cmdline-tools/* tools/bin/

      # Accept SDK licenses + install platform-tools
      - name: Accept SDK licenses
        run: |
          yes | $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses
          $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager "platform-tools" "platforms;android-33"

      # Build APK
      - name: Build APK
        run: |
          cd $GITHUB_WORKSPACE
          buildozer android debug
