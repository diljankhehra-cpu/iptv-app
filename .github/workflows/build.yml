name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install System Packages
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk zip unzip \
          python3-dev build-essential git zlib1g-dev \
          libncurses5-dev libffi-dev libssl-dev libsqlite3-dev \
          libjpeg-dev libfreetype6-dev liblzma-dev

      - name: Install Python Packages
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK
        run: buildozer android debug --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
