name: Build APK (R25b NDK)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Install system dependencies
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk wget build-essential

      # 3️⃣ Install Buildozer, python-for-android & Cython
      - name: Install Buildozer & dependencies
        run: |
          pip3 install --upgrade "buildozer==1.5.1" "python-for-android==2026.3.0" cython

      # 4️⃣ Setup Android SDK & NDK (R25b)
      - name: Setup Android SDK & NDK
        run: |
          mkdir -p $HOME/.buildozer/android/platform
          cd $HOME/.buildozer/android/platform

          # Install NDK R25b
          if [ ! -d "android-ndk-r25b" ]; then
            wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O android-ndk.zip
            unzip android-ndk.zip
            rm android-ndk.zip
          fi

          # Install SDK command-line tools
          mkdir -p android-sdk/cmdline-tools
          cd android-sdk/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip
          rm cmdline-tools.zip

          # Move to 'latest' folder (Buildozer requirement)
          mkdir -p latest
          mv cmdline-tools/* latest/

          # Symlink for old path compatibility
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
          ln -s $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/* \
                $HOME/.buildozer/android/platform/android-sdk/tools/bin/

      # 5️⃣ Accept SDK licenses & install platform-tools + platforms
      - name: Accept SDK licenses
        run: |
          yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33"

      # 6️⃣ Build APK with verbose logging
      - name: Build APK
        run: |
          cd $GITHUB_WORKSPACE
          buildozer android debug --verbose

      # 7️⃣ Upload APK as artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: $GITHUB_WORKSPACE/bin/*.apk
