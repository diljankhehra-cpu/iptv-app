name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2️⃣ Setup Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    # 3️⃣ Create Buildozer virtual environment
    - name: Create Buildozer venv
      shell: bash
      run: |
        python -m venv buildozer-venv
        ./buildozer-venv/bin/pip install --upgrade pip setuptools wheel

    # 4️⃣ Install Buildozer, Cython & Python-for-Android
    - name: Install Buildozer & Cython
      shell: bash
      run: |
        source buildozer-venv/bin/activate
        pip install cython==0.29.36 buildozer python-for-android

    # 5️⃣ Install Android SDK + Build Tools
    - name: Install Android SDK + Build Tools
      shell: bash
      run: |
        SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_ROOT/cmdline-tools

        # Download and unzip command line tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip -d $SDK_ROOT/cmdline-tools/
        rm cmdline-tools.zip
        mv $SDK_ROOT/cmdline-tools/cmdline-tools $SDK_ROOT/cmdline-tools/latest

        # Accept licenses non-interactively
        yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_ROOT --licenses

        # Install required packages (use build-tools 33.0.2 to avoid 37 license issues)
        $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_ROOT \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653" \
            "cmake;3.22.1"

    # 6️⃣ Build APK using Buildozer
    - name: Build APK
      shell: bash
      working-directory: ./  # directory with buildozer.spec
      run: |
        source buildozer-venv/bin/activate
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36 buildozer python-for-android
        python -m buildozer android debug
