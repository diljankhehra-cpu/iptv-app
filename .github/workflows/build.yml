name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 1️⃣ Setup Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    # 2️⃣ Create virtual environment for Buildozer
    - name: Create Buildozer venv
      shell: bash
      run: |
        python -m venv buildozer-venv
        ./buildozer-venv/bin/pip install --upgrade pip setuptools wheel

    # 3️⃣ Install Buildozer & Cython
    - name: Install Buildozer & Cython
      shell: bash
      run: |
        ./buildozer-venv/bin/pip install cython==0.29.36 buildozer python-for-android

    # 4️⃣ Install Android SDK command line tools + licenses + required packages
    - name: Install Android SDK + Build Tools
      shell: bash
      run: |
        SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_ROOT/cmdline-tools

        # Download command line tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip -d $SDK_ROOT/cmdline-tools/
        rm cmdline-tools.zip
        mv $SDK_ROOT/cmdline-tools/cmdline-tools $SDK_ROOT/cmdline-tools/latest

        # Non-interactive license acceptance
        mkdir -p $SDK_ROOT/licenses
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $SDK_ROOT/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > $SDK_ROOT/licenses/android-sdk-preview-license
        echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $SDK_ROOT/licenses/google-gdk-license

        # Install required SDK packages
        $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653" \
            "cmake;3.22.1" --verbose

    # 5️⃣ Build APK using Buildozer
    - name: Build APK
      shell: bash
      working-directory: ./  # jithe buildozer.spec file hai
      run: |
        ./buildozer-venv/bin/python -m buildozer android debug
