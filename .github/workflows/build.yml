name: Build APK (Stable No Errors)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04   # 🔥 stable version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Install system dependencies
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip git zip unzip openjdk-17-jdk \
            build-essential libssl-dev libffi-dev \
            zlib1g-dev libncurses-dev libstdc++6 \
            libsqlite3-dev

      # ✅ Install Buildozer
      - name: Install Buildozer
        run: |
          pip3 install --upgrade pip setuptools wheel
          pip3 install cython==0.29.33 buildozer

      # ✅ Setup Android SDK
      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip -d cmdline-tools
          mv cmdline-tools/cmdline-tools cmdline-tools/latest

          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      # ✅ Install SDK + FIX AIDL
      - name: Install SDK Packages
        run: |
          yes | sdkmanager --licenses

          sdkmanager --install \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

          # 🔥 verify install
          ls $HOME/android-sdk/build-tools

      # ✅ Fix AIDL path
      - name: Fix AIDL Path
        run: |
          echo "$HOME/android-sdk/build-tools/33.0.2" >> $GITHUB_PATH

      # ✅ Build APK
      - name: Build APK
        run: |
          export BUILDOZER_ALLOW_ROOT=1
          buildozer android debug

      # ✅ Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-APK
          path: bin/*.apk
