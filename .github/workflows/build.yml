name: Build APK (Ultimate Fix All Errors)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: 25b

    steps:
    # 📥 CODE
    - name: Checkout
      uses: actions/checkout@v4

    # 🐍 PYTHON
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # ☕ JAVA
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"

    # 📦 INSTALL DEPENDENCIES
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev \
          libltdl-dev libsqlite3-dev sqlite3 \
          ffmpeg libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev

        python -m pip install --upgrade pip
        pip install cython==0.29.36 buildozer

    # 🧹 CLEAN
    - name: Clean build
      run: |
        rm -rf .buildozer
        rm -rf ~/.buildozer
        rm -rf bin

    # ⚙️ FIX buildozer.spec FULL
    - name: Fix buildozer.spec
      run: |
        sed -i 's/^# *android.api *=.*/android.api = 33/' buildozer.spec || true
        sed -i 's/^# *android.minapi *=.*/android.minapi = 21/' buildozer.spec || true
        sed -i 's/^# *android.ndk *=.*/android.ndk = 25b/' buildozer.spec || true
        sed -i 's/^# *android.sdk *=.*/android.sdk = 33/' buildozer.spec || true
        sed -i 's/^# *android.ndk_api *=.*/android.ndk_api = 21/' buildozer.spec || true
        sed -i 's/^# *android.build_tools *=.*/android.build_tools = 33.0.0/' buildozer.spec || true
        sed -i 's/^# *requirements *=.*/requirements = python3,kivy,requests/' buildozer.spec || true
        echo "android.accept_sdk_license = True" >> buildozer.spec

    # 🔑 ACCEPT LICENSE + INSTALL SDK
    - name: Accept SDK licenses
      run: |
        yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

    # 📱 BUILD APK
    - name: Build APK
      run: |
        buildozer android debug

    # 📦 UPLOAD APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: IPTV-APK
        path: bin/*.apk
