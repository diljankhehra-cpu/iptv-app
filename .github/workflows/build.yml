name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y zip unzip wget tar openjdk-17-jdk zlib1g-dev

    - name: Create virtual environment and install Buildozer
      run: |
        python -m venv buildozer-venv
        source buildozer-venv/bin/activate
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36 buildozer python-for-android

    - name: Install Android SDK + Build Tools
      shell: bash
      run: |
        SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_ROOT/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip -d $SDK_ROOT/cmdline-tools/
        rm cmdline-tools.zip
        mv $SDK_ROOT/cmdline-tools/cmdline-tools $SDK_ROOT/cmdline-tools/latest

        # Accept all licenses automatically
        yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_ROOT --licenses || true

        # Install platform-tools, build-tools, and SDK platforms
        $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_ROOT \
          "platform-tools" \
          "platforms;android-33" \
          "build-tools;33.0.2"

    - name: Build APK
      shell: bash
      run: |
        source buildozer-venv/bin/activate
        buildozer android debug
      working-directory: ./app
