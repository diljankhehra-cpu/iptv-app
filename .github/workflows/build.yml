name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout repo
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ Install system dependencies
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y zip unzip tar wget openjdk-17-jdk zlib1g-dev

    # 3️⃣ Set up Python venv & install Buildozer
    - name: Setup Python & Buildozer
      run: |
        python -m venv buildozer-venv
        ./buildozer-venv/bin/pip install --upgrade pip setuptools wheel
        ./buildozer-venv/bin/pip install cython==0.29.36 buildozer python-for-android

    # 4️⃣ Install Android SDK & Build-tools
    - name: Install Android SDK + Build Tools
      shell: bash
      run: |
        SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_ROOT/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip -d $SDK_ROOT/cmdline-tools/
        rm cmdline-tools.zip
        mv $SDK_ROOT/cmdline-tools/cmdline-tools $SDK_ROOT/cmdline-tools/latest

        # Accept all licenses safely
        yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_ROOT --licenses || true

        # Install required SDK components
        $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_ROOT \
          "platform-tools" \
          "platforms;android-33" \
          "build-tools;33.0.2"

    # 5️⃣ Build APK using Buildozer
    - name: Build APK
      shell: bash
      run: |
        ./buildozer-venv/bin/python -m buildozer android debug
      working-directory: ./  # jithe buildozer.spec file hai
