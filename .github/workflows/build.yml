name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Build APK
      shell: bash
      run: |
        # Install Cython in venv (Buildozer requires it)
        ./buildozer-venv/bin/pip install cython==0.29.36

        # Run Buildozer using Python from venv
        ./buildozer-venv/bin/python -m buildozer android debug
      working-directory: ./  # jithe buildozer.spec hai
